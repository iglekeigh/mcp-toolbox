# Cloud Build configuration for Python pre/post processing integration tests.
# This pipeline sets up the environment, runs integration tests, and cleans up.

steps:
  # Step 1: Install Python dependencies
  - name: 'python:3.11'
    id: 'install-dependencies'
    entrypoint: 'pip'
    args:
      - 'install'
      - '-r'
      - 'samples/pre_post_processing/requirements.txt'
    waitFor: ['-']

  # Step 2: Run pre-processing integration tests
  - name: 'python:3.11'
    id: 'run-pre-processing-tests'
    entrypoint: 'python'
    args:
      - '-m'
      - 'pytest'
      - 'samples/pre_post_processing/tests/'
      - '-v'
      - '--timeout=120'
    env:
      - 'PROJECT_ID=$PROJECT_ID'
      - 'REGION=$_REGION'
      - 'DB_NAME=$_DB_NAME'
      - 'DB_USER=$_DB_USER'
      - 'DB_PASS=$_DB_PASS'
      - 'INSTANCE_CONNECTION_NAME=$_INSTANCE_CONNECTION_NAME'
    waitFor:
      - 'install-dependencies'

substitutions:
  _REGION: 'us-central1'
  _DB_NAME: 'toolbox_db'
  _DB_USER: 'toolbox_user'
  _DB_PASS: ''
  _INSTANCE_CONNECTION_NAME: ''

options:
  logging: CLOUD_LOGGING_ONLY
  dynamicSubstitutions: true

timeout: '1800s'
